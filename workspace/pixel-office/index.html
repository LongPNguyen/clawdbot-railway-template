<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Office v14</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1868a8;overflow:hidden;font-family:'Courier New',monospace;width:100vw;height:100vh}
#game-container{position:relative;width:100vw;height:calc(100vh - 48px);overflow:hidden;touch-action:none}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;cursor:grab;display:block;width:100%;height:100%}
canvas:active{cursor:grabbing}

/* ─── TOOLBAR ─── */
#toolbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(30,20,10,0.95);border-top:2px solid #c8a040;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 8px;z-index:100;backdrop-filter:blur(8px);overflow-x:auto;-webkit-overflow-scrolling:touch}
.agent-btn{background:#2a1808;border:2px solid #c8a040;border-radius:8px;color:#f0e0c0;padding:5px 10px;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.agent-btn:hover{background:#3a2818;border-color:#e8c060}
.agent-btn.selected{border-color:#e87828;background:#4a2010;box-shadow:0 0 8px rgba(232,120,40,.4)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;transition:box-shadow .3s}
.agent-btn .status-dot.pulse{animation:dotPulse 1.5s infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 2px currentColor}50%{box-shadow:0 0 8px currentColor,0 0 12px currentColor}}
#zoom-display{margin-left:auto;font-size:11px;color:#c8a040;flex-shrink:0;padding:0 6px}

/* ─── MODE INDICATOR ─── */
#mode-indicator{position:fixed;top:12px;left:12px;z-index:250;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;letter-spacing:1px;border:1px solid}
#mode-indicator.live{background:rgba(72,200,104,.2);border-color:#48c868;color:#48c868}
#mode-indicator.demo{background:rgba(232,168,64,.2);border-color:#e8a840;color:#e8a840}
#mode-indicator .blink-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── THEME SWITCHER ─── */
#theme-switcher{position:fixed;top:12px;left:140px;z-index:250;display:flex;gap:4px}
#theme-switcher button{background:rgba(30,20,10,0.85);border:1px solid #c8a040;border-radius:6px;color:#f0e0c0;padding:4px 10px;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;transition:all .15s;letter-spacing:.5px}
#theme-switcher button:hover{background:rgba(60,40,20,0.9);border-color:#e8c060}
#theme-switcher button.active{background:rgba(200,160,64,.25);border-color:#e8c060;color:#f8e880}

/* ─── DETAIL CARD ─── */
#status-panel{position:fixed;top:16px;right:16px;width:280px;background:rgba(20,14,8,.96);border:2px solid #c8a040;border-radius:12px;padding:16px;z-index:200;display:none;font-size:12px;line-height:1.6;color:#f0e0c0;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
#status-panel.visible{display:block;animation:cardIn .2s ease-out}
@keyframes cardIn{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
#status-panel .panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#status-panel .panel-name{font-size:15px;font-weight:bold;display:flex;align-items:center;gap:8px}
#status-panel .close-btn{background:none;border:none;color:#c8a040;font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px}
#status-panel .close-btn:hover{background:rgba(200,160,64,.15)}
.panel-divider{border:none;border-top:1px solid rgba(200,160,64,.25);margin:10px 0}
.panel-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.panel-label{color:#a08060;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.panel-value{color:#f0e0c0;font-weight:bold}
.panel-activity-desc{margin-top:6px;padding:8px 10px;background:rgba(200,160,64,.08);border-radius:6px;border-left:3px solid #c8a040;font-size:12px;color:#d8c8a0;line-height:1.5}
.panel-stat-row{display:flex;gap:12px;margin-top:8px}
.panel-stat{flex:1;text-align:center;padding:6px 4px;background:rgba(200,160,64,.06);border-radius:6px}
.panel-stat .stat-val{font-size:14px;font-weight:bold;color:#f0e0c0}
.panel-stat .stat-label{font-size:9px;color:#a08060;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
#panel-recent{margin-top:8px;font-size:10px;color:#807060;max-height:60px;overflow-y:auto}
#panel-recent div{padding:1px 0;border-bottom:1px solid rgba(200,160,64,.08)}

/* ─── FADE OVERLAY for theme transitions ─── */
#theme-fade{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;opacity:0;pointer-events:none;z-index:300;transition:opacity .3s ease}
#theme-fade.active{opacity:1}

@media(max-width:768px){
  #toolbar{height:42px;gap:3px;padding:0 4px;justify-content:flex-start}
  .agent-btn{padding:3px 6px;font-size:10px;gap:2px}
  .status-dot{width:6px;height:6px}
  #zoom-display{font-size:10px}
  #game-container{height:calc(100vh - 42px)}
  #status-panel{width:calc(100vw - 24px);max-width:320px;right:12px;top:40px;padding:12px;font-size:11px;max-height:calc(100vh - 100px);overflow-y:auto}
  #mode-indicator{top:8px;left:8px;padding:3px 7px;font-size:10px}
  #theme-switcher{top:8px;left:120px}
  #theme-switcher button{padding:3px 7px;font-size:9px}
}
@media(max-width:480px){
  .agent-btn{padding:2px 5px;font-size:9px}
  #toolbar{height:38px}
  #game-container{height:calc(100vh - 38px)}
  #theme-switcher{top:36px;left:8px}
}
</style>
</head>
<body>

<div id="game-container"><canvas id="canvas"></canvas></div>
<div id="toolbar"></div>

<!-- Detail Card -->
<div id="status-panel">
  <div class="panel-header">
    <div class="panel-name">
      <span class="status-dot" id="panel-dot"></span>
      <span id="panel-agent-name"></span>
    </div>
    <button class="close-btn" id="panel-close">&times;</button>
  </div>
  <div style="font-size:11px;color:#a08060;margin-top:-6px;margin-bottom:8px" id="panel-role"></div>
  <hr class="panel-divider">
  <div class="panel-row">
    <span class="panel-label">Status</span>
    <span class="panel-value" id="panel-status"></span>
  </div>
  <div class="panel-activity-desc" id="panel-activity-desc"></div>
  <div class="panel-stat-row">
    <div class="panel-stat"><div class="stat-val" id="panel-time">0s</div><div class="stat-label">In State</div></div>
    <div class="panel-stat"><div class="stat-val" id="panel-room">—</div><div class="stat-label">Location</div></div>
    <div class="panel-stat"><div class="stat-val" id="panel-type">—</div><div class="stat-label">Type</div></div>
  </div>
  <hr class="panel-divider">
  <div class="panel-label" style="margin-bottom:4px">Recent</div>
  <div id="panel-recent"></div>
</div>

<div id="mode-indicator" class="demo"><span class="blink-dot"></span><span id="mode-label">DEMO</span></div>
<div id="theme-switcher"></div>
<div id="theme-fade"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
